<!-- Normal — dashed vertical, slightly off true vertical -->
<path d="M 342 48 C 341 90, 343 140, 341 180 C 340 210, 342 250, 340 300 C 339 340, 341 380, 340 430" fill="none" stroke="#888" stroke-width="1.8" stroke-dasharray="9,7" stroke-linecap="round" mask="url(#imagine-text-gaps-869yn9)" style="fill:none;stroke:rgb(136, 136, 136);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-dasharray:9px, 7px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- 
  Incidence point: (340, 231)
  θ1 = 38° from normal → incoming from upper-left
  sin38=0.616, cos38=0.788
  Start: (340 - 0.616*210, 231 - 0.788*210) = (211, 65)

  θ2 = 58° from normal → refracted lower-right (denser medium)
  sin58=0.848, cos58=0.530
  End: (340 + 0.848*200, 231 + 0.530*200) = (510, 337)

  Reflected: mirror of incident → upper-right
  End: (340 + 0.616*160, 231 - 0.788*160) = (439, 105)
-->

<!-- Incident ray — blue, slightly wobbly -->
<path d="M 214 68 C 240 100, 275 148, 300 179 C 315 196, 328 212, 340 231" fill="none" stroke="#1a6bbf" stroke-width="3.5" stroke-linecap="round" mask="url(#imagine-text-gaps-869yn9)" style="fill:none;stroke:rgb(26, 107, 191);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
