<text x="86" y="144" font-family="Georgia, serif" font-size="12" fill="#7a3a9a" font-style="italic" style="fill:rgb(122, 58, 154);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:12px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">n=3</text>
