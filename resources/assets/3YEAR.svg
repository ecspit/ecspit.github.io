    <path d="M1 1L9 5L1 9" fill="#1a1a1a" stroke="none"/>
  </marker>
<mask id="imagine-text-gaps-pju3d9" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="690" height="370" fill="white"/><rect x="65.76513671875" y="12" width="17.04541015625" height="19" fill="black" rx="2"/><rect x="82" y="281" width="30.1640625" height="17.5" fill="black" rx="2"/><rect x="82" y="231" width="27.953125" height="17.5" fill="black" rx="2"/><rect x="82" y="181" width="29.5" height="17.5" fill="black" rx="2"/><rect x="82" y="131" width="29.421875" height="17.5" fill="black" rx="2"/><rect x="82" y="81" width="29.578125" height="17.5" fill="black" rx="2"/><rect x="94" y="297" width="31.796875" height="15" fill="black" rx="2"/><rect x="303.58203125" y="332" width="72.8359375" height="21.5" fill="black" rx="2"/></mask></defs>
<rect width="680" height="360" fill="#f9f8f5" style="fill:rgb(249, 248, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Parabolic potential well V(x) = ½mω²x² -->
<path d="M 120 310 Q 340 30 560 310" fill="none" stroke="#bbb" stroke-width="1.4" stroke-dasharray="6,4" mask="url(#imagine-text-gaps-pju3d9)" style="fill:none;stroke:rgb(187, 187, 187);color:rgb(255, 255, 255);stroke-width:1.4px;stroke-dasharray:6px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

