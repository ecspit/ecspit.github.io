<text x="98" y="308" font-family="Georgia, serif" font-size="10" fill="#2563a8" font-style="italic" style="fill:rgb(37, 99, 168);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:10px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">½ℏω</text>

