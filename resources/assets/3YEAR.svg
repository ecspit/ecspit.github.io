<text x="86" y="244" font-family="Georgia, serif" font-size="12" fill="#1a7a5e" font-style="italic" style="fill:rgb(26, 122, 94);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:12px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">n=1</text>
